<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2048</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #fef7ed, #fef3c7);
      font-family: system-ui, -apple-system, sans-serif;
    }
    h1 {
      font-size: 3.5rem;
      font-weight: 800;
      color: #92400e;
      text-shadow: 2px 2px 0 #fcd34d;
      margin-bottom: 1rem;
    }
    .scores {
      display: flex;
      gap: 1rem;
      margin-bottom: 1rem;
    }
    .score-box {
      padding: 0.5rem 1.5rem;
      border-radius: 1rem;
      text-align: center;
      color: white;
    }
    .score-box.current { background: linear-gradient(180deg, #f59e0b, #d97706); }
    .score-box.best { background: linear-gradient(180deg, #78350f, #451a03); }
    .score-box span { display: block; font-size: 0.7rem; text-transform: uppercase; opacity: 0.8; }
    .score-box strong { font-size: 1.5rem; }
    canvas { border-radius: 1rem; }
    .game-container { position: relative; }
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      border-radius: 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      display: none;
    }
    .overlay.show { display: flex; }
    .overlay.win { background: rgba(251,191,36,0.95); }
    .overlay.lose { background: rgba(120,53,15,0.9); }
    .overlay h2 { font-size: 2.25rem; font-weight: bold; }
    .overlay.win h2 { color: #78350f; }
    .overlay.lose h2 { color: #fcd34d; }
    .overlay-buttons { display: flex; gap: 0.75rem; }
    .overlay button { margin: 0; padding: 0.6rem 1.25rem; font-size: 0.9rem; }
    .overlay.win button.secondary { 
      background: linear-gradient(180deg, #78350f, #451a03); 
      color: #fcd34d; 
    }
    button {
      margin-top: 1rem;
      padding: 0.75rem 2rem;
      border: none;
      border-radius: 0.75rem;
      background: linear-gradient(180deg, #fbbf24, #f59e0b);
      color: #78350f;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s;
    }
    button:hover { transform: scale(1.05); }
    button:active { transform: scale(0.95); }
    .size-btn {
      margin: 0;
      padding: 0.5rem 1rem;
      background: linear-gradient(180deg, #78350f, #451a03);
      color: #fcd34d;
      font-size: 0.9rem;
    }
    p { margin-top: 1rem; color: #92400e; font-size: 0.875rem; }
  </style>
</head>
<body>
  <h1>2048</h1>
  <div class="scores">
    <div class="score-box current"><span>Score</span><strong id="score">0</strong></div>
    <div class="score-box best"><span>Best</span><strong id="best">0</strong></div>
    <button id="sizeToggle" class="size-btn">8×8</button>
  </div>
  <div class="game-container">
    <canvas id="game"></canvas>
    <div id="winOverlay" class="overlay win">
      <h2>You Win! 🎉</h2>
      <div class="overlay-buttons">
        <button id="keepPlaying">Keep Playing</button>
        <button id="winNewGame" class="secondary">New Game</button>
      </div>
    </div>
    <div id="loseOverlay" class="overlay lose">
      <h2>Game Over!</h2>
      <button id="loseNewGame">Try Again</button>
    </div>
  </div>
  <button id="newGame">New Game</button>
  <p>Arrow keys to play • Hold for fast moves</p>

<script>
(function() {
  let SIZE = 4;
  let CELL = 100;
  const GAP = 12;
  const ANIM_DURATION = 50;

  const COLORS = {
    0: ['#ffffff26', '#78350f'],
    2: ['#fef3c7', '#92400e'],
    4: ['#fde68a', '#92400e'],
    8: ['#fdba74', '#fff'],
    16: ['#fb923c', '#fff'],
    32: ['#f97316', '#fff'],
    64: ['#ea580c', '#fff'],
    128: ['#fcd34d', '#fff'],
    256: ['#fbbf24', '#fff'],
    512: ['#f59e0b', '#fff'],
    1024: ['#d97706', '#fff'],
    2048: ['#b45309', '#fff'],
    4096: ['#7c2d12', '#fff'],
    8192: ['#1c1917', '#fcd34d'],
  };

  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;

  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const sizeToggle = document.getElementById('sizeToggle');
  const winOverlay = document.getElementById('winOverlay');
  const loseOverlay = document.getElementById('loseOverlay');

  let GRID_SIZE;
  let grid;
  let score = 0;
  let best = 0;
  let gameOver = false;
  let won = false;
  let keepPlaying = false;
  const tiles = [];
  let animating = false;
  let animStart = 0;

  function setSize(newSize) {
    SIZE = newSize;
    CELL = newSize === 4 ? 100 : 56;
    GRID_SIZE = SIZE * CELL + (SIZE + 1) * GAP;
    canvas.width = GRID_SIZE * dpr;
    canvas.height = GRID_SIZE * dpr;
    canvas.style.width = GRID_SIZE + 'px';
    canvas.style.height = GRID_SIZE + 'px';
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.scale(dpr, dpr);
    grid = new Uint16Array(SIZE * SIZE);
    sizeToggle.textContent = newSize === 4 ? '8×8' : '4×4';
  }

  function idx(r, c) { return r * SIZE + c; }

  function cellPos(i) {
    return GAP + i * (CELL + GAP);
  }

  function addTile() {
    const empty = [];
    const total = SIZE * SIZE;
    for (let i = 0; i < total; i++) {
      if (grid[i] === 0) empty.push(i);
    }
    if (empty.length === 0) return false;
    const i = empty[(Math.random() * empty.length) | 0];
    grid[i] = Math.random() < 0.9 ? 2 : 4;
    tiles.push({
      value: grid[i],
      r: (i / SIZE) | 0,
      c: i % SIZE,
      fromR: (i / SIZE) | 0,
      fromC: i % SIZE,
      scale: 0,
      merged: false
    });
    return true;
  }

  function init() {
    grid.fill(0);
    tiles.length = 0;
    score = 0;
    gameOver = false;
    won = false;
    keepPlaying = false;
    winOverlay.classList.remove('show');
    loseOverlay.classList.remove('show');
    addTile();
    addTile();
    if (SIZE === 8) { addTile(); addTile(); } // Extra tiles for 8x8
    updateScore();
    render();
  }

  function updateScore() {
    scoreEl.textContent = score;
    if (score > best) {
      best = score;
      bestEl.textContent = best;
    }
  }

  function canMove() {
    const total = SIZE * SIZE;
    for (let i = 0; i < total; i++) {
      if (grid[i] === 0) return true;
    }
    for (let r = 0; r < SIZE; r++) {
      for (let c = 0; c < SIZE; c++) {
        const v = grid[idx(r, c)];
        if (c < SIZE - 1 && grid[idx(r, c + 1)] === v) return true;
        if (r < SIZE - 1 && grid[idx(r + 1, c)] === v) return true;
      }
    }
    return false;
  }

  function move(dir) {
    if (gameOver || animating) return false;

    const oldGrid = new Uint16Array(grid);
    tiles.length = 0;
    let moved = false;
    let dr = 0, dc = 0, rStart = 0, rEnd = SIZE, rStep = 1, cStart = 0, cEnd = SIZE, cStep = 1;

    if (dir === 0) { dc = -1; cStart = 1; } // left
    else if (dir === 1) { dc = 1; cStart = SIZE - 2; cEnd = -1; cStep = -1; } // right
    else if (dir === 2) { dr = -1; rStart = 1; } // up
    else { dr = 1; rStart = SIZE - 2; rEnd = -1; rStep = -1; } // down

    const merged = new Uint8Array(SIZE * SIZE);

    for (let r = rStart; r !== rEnd; r += rStep) {
      for (let c = cStart; c !== cEnd; c += cStep) {
        const i = idx(r, c);
        if (grid[i] === 0) continue;

        let nr = r, nc = c;
        while (true) {
          const nextR = nr + dr, nextC = nc + dc;
          if (nextR < 0 || nextR >= SIZE || nextC < 0 || nextC >= SIZE) break;
          const nextI = idx(nextR, nextC);
          if (grid[nextI] === 0) {
            nr = nextR;
            nc = nextC;
          } else if (grid[nextI] === grid[i] && !merged[nextI]) {
            nr = nextR;
            nc = nextC;
            break;
          } else break;
        }

        const ni = idx(nr, nc);
        if (ni !== i) {
          moved = true;
          if (grid[ni] === grid[i]) {
            grid[ni] *= 2;
            score += grid[ni];
            merged[ni] = 1;
            if (grid[ni] === 2048 && !won && !keepPlaying) won = true;
            tiles.push({ value: grid[ni], r: nr, c: nc, fromR: r, fromC: c, scale: 1, merged: true });
          } else {
            grid[ni] = grid[i];
            tiles.push({ value: grid[i], r: nr, c: nc, fromR: r, fromC: c, scale: 1, merged: false });
          }
          grid[i] = 0;
        } else {
          tiles.push({ value: grid[i], r, c, fromR: r, fromC: c, scale: 1, merged: false });
        }
      }
    }

    // Add stationary tiles
    const total = SIZE * SIZE;
    for (let i = 0; i < total; i++) {
      if (grid[i] !== 0 && !tiles.some(t => t.r === ((i / SIZE) | 0) && t.c === i % SIZE)) {
        tiles.push({ value: grid[i], r: (i / SIZE) | 0, c: i % SIZE, fromR: (i / SIZE) | 0, fromC: i % SIZE, scale: 1, merged: false });
      }
    }

    if (moved) {
      animating = true;
      animStart = performance.now();
      requestAnimationFrame(animate);
    }

    return moved;
  }

  function animate(now) {
    const moveT = Math.min((now - animStart) / ANIM_DURATION, 1);
    const ease = moveT < 0.5 ? 2 * moveT * moveT : 1 - Math.pow(-2 * moveT + 2, 2) / 2;
    const pulseT = (now - animStart) / 120;

    render(ease);

    if (moveT < 1 || pulseT < 1) {
      requestAnimationFrame(animate);
    } else {
      animating = false;
      addTile();
      updateScore();
      if (!canMove()) gameOver = true;
      render(1);
    }
  }

  function render(t = 1) {
    // Background
    ctx.fillStyle = '#b45309';
    ctx.beginPath();
    ctx.roundRect(0, 0, GRID_SIZE, GRID_SIZE, 16);
    ctx.fill();

    // Empty cells
    ctx.fillStyle = '#ffffff26';
    for (let r = 0; r < SIZE; r++) {
      for (let c = 0; c < SIZE; c++) {
        ctx.beginPath();
        ctx.roundRect(cellPos(c), cellPos(r), CELL, CELL, 12);
        ctx.fill();
      }
    }

    // Tiles
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    for (const tile of tiles) {
      const x = cellPos(tile.fromC) + (cellPos(tile.c) - cellPos(tile.fromC)) * t;
      const y = cellPos(tile.fromR) + (cellPos(tile.r) - cellPos(tile.fromR)) * t;
      
      let scale = tile.scale;
      if (tile.fromR === tile.r && tile.fromC === tile.c && tile.scale === 0) {
        scale = t; // New tile pop-in
      } else if (tile.merged) {
        const elapsed = performance.now() - animStart;
        const pulseT = Math.min(1, elapsed / 120);
        scale = 1 + 0.15 * Math.sin(Math.PI * pulseT); // Pulse up and back to 1
      }

      const colors = COLORS[tile.value] || ['#78350f', '#fff'];
      const cx = x + CELL / 2;
      const cy = y + CELL / 2;

      ctx.save();
      ctx.translate(cx, cy);
      ctx.scale(scale, scale);
      
      ctx.fillStyle = colors[0];
      ctx.beginPath();
      ctx.roundRect(-CELL / 2, -CELL / 2, CELL, CELL, 12);
      ctx.fill();

      ctx.fillStyle = colors[1];
      const fontSize = SIZE === 8 
        ? (tile.value >= 1000 ? 16 : tile.value >= 100 ? 20 : 24)
        : (tile.value >= 1000 ? 28 : tile.value >= 100 ? 36 : 44);
      ctx.font = `bold ${fontSize}px system-ui`;
      ctx.fillText(tile.value, 0, 2);
      
      ctx.restore();
    }

    // Overlay
    winOverlay.classList.toggle('show', won && !keepPlaying);
    loseOverlay.classList.toggle('show', gameOver);
  }

  // Input handling with key repeat
  const keys = new Set();
  const dirMap = { ArrowLeft: 0, ArrowRight: 1, ArrowUp: 2, ArrowDown: 3 };
  let lastMove = 0;
  let repeatTimeout = null;
  let repeating = false;
  const MOVE_DELAY = 60;
  const REPEAT_DELAY = 200;

  function processInput() {
    if (!repeating || keys.size === 0) return;
    const now = performance.now();
    if (now - lastMove < MOVE_DELAY) {
      requestAnimationFrame(processInput);
      return;
    }
    for (const key of keys) {
      if (dirMap[key] !== undefined) {
        if (move(dirMap[key])) lastMove = now;
        break;
      }
    }
    if (keys.size > 0 && repeating) requestAnimationFrame(processInput);
  }

  document.addEventListener('keydown', e => {
    if (dirMap[e.key] !== undefined) {
      e.preventDefault();
      if (!keys.has(e.key)) {
        keys.add(e.key);
        // Single move immediately
        move(dirMap[e.key]);
        lastMove = performance.now();
        // Start repeat only after holding
        if (!repeatTimeout) {
          repeatTimeout = setTimeout(() => {
            repeating = true;
            processInput();
          }, REPEAT_DELAY);
        }
      }
    }
  });

  document.addEventListener('keyup', e => {
    keys.delete(e.key);
    if (keys.size === 0) {
      clearTimeout(repeatTimeout);
      repeatTimeout = null;
      repeating = false;
    }
  });
  document.getElementById('newGame').addEventListener('click', init);
  document.getElementById('keepPlaying').addEventListener('click', () => {
    keepPlaying = true;
    won = false;
    render();
  });
  document.getElementById('winNewGame').addEventListener('click', init);
  document.getElementById('loseNewGame').addEventListener('click', init);
  sizeToggle.addEventListener('click', () => {
    setSize(SIZE === 4 ? 8 : 4);
    init();
  });

  setSize(4);
  init();
})();
</script>
</body>
</html>
