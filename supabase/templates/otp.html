<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <meta name="color-scheme" content="light">
  <meta name="supported-color-schemes" content="light">
</head>
<!--
  OTP / Magic-Link email template for local Supabase development (supabase start).
  Template variables injected by the Supabase auth server:
    {{ .Token }}      — the 6-digit OTP code the user types manually
    {{ .TokenHash }}  — the hash used to construct the one-click magic link
    {{ .RedirectTo }} — the URL Supabase redirects to after verification
    {{ .SiteURL }}    — the base URL of the Supabase project

  NOTE: In production this template is NOT used directly. The custom
  send-email Edge Function (supabase/functions/send-email/index.ts) intercepts
  all auth emails before they are sent and builds the HTML itself, so the
  design and the magic link are always in sync.
-->
<body style="margin:0;padding:0;background:#fef3c7;font-family:'Trebuchet MS',Helvetica,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#fef3c7;padding:40px 16px;">
    <tr><td align="center">
      <table role="presentation" width="460" cellpadding="0" cellspacing="0"
             style="max-width:460px;width:100%;background:#ffffff;border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(120,53,15,0.08);">

        <!-- Header -->
        <tr>
          <td style="background:#92400e;padding:28px 40px;text-align:center;">
            <table role="presentation" cellpadding="0" cellspacing="0" style="margin:0 auto;">
              <tr>
                <td style="background:#b45309;border-radius:8px;padding:6px 18px;">
                  <span style="font-family:'Trebuchet MS',Helvetica,sans-serif;font-size:44px;font-weight:bold;color:#fcd34d;letter-spacing:-1px;line-height:1.1;">2048</span>
                </td>
              </tr>
            </table>
          </td>
        </tr>

        <!-- Body -->
        <tr>
          <td style="padding:36px 32px 32px;">

            <p style="margin:0 0 6px;font-size:18px;font-weight:bold;color:#78350f;text-align:center;">Your verification code</p>
            <p style="margin:0 0 28px;font-size:14px;color:#a16207;text-align:center;">Enter this code to sign in to your account</p>

            <!-- OTP code — large, bold, easy to select/copy -->
            <table role="presentation" cellpadding="0" cellspacing="0" style="margin:0 auto 8px;" align="center">
              <tr>
                <td style="padding:12px 0;">
                  <span style="font-family:'Trebuchet MS',Helvetica,sans-serif;font-size:48px;font-weight:bold;color:#78350f;letter-spacing:14px;line-height:1;">{{ .Token }}</span>
                </td>
              </tr>
            </table>

            <!-- Expiry notice -->
            <table role="presentation" cellpadding="0" cellspacing="0" style="margin:0 auto 20px;background:#fef3c7;border-radius:8px;" align="center">
              <tr>
                <td style="padding:10px 20px;text-align:center;">
                  <span style="font-size:13px;color:#92400e;font-weight:bold;">Expires in 10 minutes</span>
                </td>
              </tr>
            </table>

            <p style="margin:0;font-size:12px;color:#b4a08a;text-align:center;">If you didn't request this code, you can safely ignore this email.</p>
          </td>
        </tr>

        <!-- Footer -->
        <tr>
          <td style="background:#fef3c7;padding:16px 32px;text-align:center;border-top:1px solid #fde68a;">
            <p style="margin:0;font-size:12px;color:#a16207;">2048 Game &mdash; Join the tiles, get to 2048!</p>
          </td>
        </tr>

      </table>
    </td></tr>
  </table>
</body>
</html>
